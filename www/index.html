<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Platform Control Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 1100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .status { font-weight: bold; }
        .running { color: #2ecc71; }
        .exited { color: #e74c3c; }
        .paused { color: #f39c12; }
        button { margin-top: 6px; }
        code { font-size: 12px; }

        /* Progress Bar Styling */
        #upload-container { margin-top: 20px; border-top: 2px solid #444; padding-top: 15px; }
        .progress-wrapper { width: 100%; background-color: #333; border-radius: 5px; margin: 10px 0; display: none; height: 12px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background-color: #007bff; transition: width 0.2s; }
        #upload-status { font-size: 0.85rem; margin-top: 5px; min-height: 1.2em; }
    </style>
</head>

<body>

<h1>🚀 Data Platform Control Center</h1>

<div class="grid">

    <section>
        <h3>Live Services</h3>
        <div id="services">Loading...</div>
    </section>

    <section>
        <h3>Quick Links</h3>
        <ul>
            <li><a href="http://localhost:8080" target="_blank">Airflow</a></li>
            <li><a href="http://localhost:8088" target="_blank">Superset</a></li>
            <li><a href="https://localhost:8443/nifi" target="_blank">NiFi</a></li>
            <li><a href="http://localhost:5050" target="_blank">pgAdmin</a></li>
            <li><a href="http://localhost:8082" target="_blank">dbt Docs</a></li>
        </ul>

        <div id="upload-container" class="card">
            <h3>📥 Data Ingestion</h3>
            <p style="font-size: 0.8rem; color: #888;">Upload CSV directly to NiFi /inbox</p>
            <input type="file" id="fileInput" accept=".csv" style="width: 96%;">
            
            <div class="progress-wrapper" id="progressWrapper">
                <div id="progress-bar"></div>
            </div>
            
            <button onclick="uploadFile()" id="uploadBtn" style="width: 100%;">🚀 Upload to Pipeline</button>
            <div id="upload-status"></div>
        </div>

        <h3 style="margin-top:20px;">System</h3>
        <button onclick="refresh()">🔄 Refresh Now</button>
    </section>

</div>

<script>
// --- SERVICE STATUS LOGIC (Localhost Ports) ---
const STATUS_API = "http://localhost:9000/status";
const RESTART_BASE = "http://localhost:9000/service";
const UPLOAD_URL = "/api/upload"; // Direct to Flask API

async function restart(name) {
    try {
        await fetch(`${RESTART_BASE}/${name}/restart`, { method: "POST" });
        setTimeout(refresh, 1500);
    } catch (err) { console.error("Restart failed", err); }
}

function render(data) {
    const container = document.getElementById("services");
    container.innerHTML = "";
    Object.entries(data).forEach(([name, info]) => {
        const div = document.createElement("div");
        div.className = "card";
        const statusClass = info.status === "running" ? "running" : info.status === "exited" ? "exited" : "paused";
        div.innerHTML = `
            <div><strong>${name}</strong></div>
            <div class="status ${statusClass}">${info.status}</div>
            <div>🧠 health: <code>${info.health}</code></div>
            <div>⏱ uptime: <code>${info.uptime}</code></div>
            <button onclick="restart('${name}')">🔁 Restart</button>
        `;
        container.appendChild(div);
    });
}

async function refresh() {
    try {
        const res = await fetch(STATUS_API);
        const data = await res.json();
        render(data);
    } catch (err) {
        document.getElementById("services").innerHTML = "<p style='color:red'>Failed to load status API (Check port 9000)</p>";
    }
}

// --- FILE UPLOAD LOGIC WITH PROGRESS ---
function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('upload-status');
    const progressBar = document.getElementById('progress-bar');
    const progressWrapper = document.getElementById('progressWrapper');
    const btn = document.getElementById('uploadBtn');

    if (!fileInput.files[0]) {
        status.innerText = "⚠️ Please select a file.";
        status.style.color = "orange";
        return;
    }

    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append('file', file);

    const xhr = new XMLHttpRequest();
    
    // UI Feedback
    progressWrapper.style.display = 'block';
    btn.disabled = true;
    status.innerText = "📤 Uploading...";
    status.style.color = "white";

    // Track Progress
    xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            progressBar.style.width = percent + '%';
        }
    });

    // Handle Completion
    xhr.onreadystatechange = function() {
        if (xhr.readyState === XMLHttpRequest.DONE) {
            btn.disabled = false;
            if (xhr.status === 200) {
                status.style.color = "#2ecc71";
                status.innerText = "✅ Success! File sent to NiFi.";
                fileInput.value = ''; 
            } else {
                status.style.color = "#e74c3c";
                status.innerText = "❌ Error: " + xhr.statusText;
            }
            // Auto-hide progress after 3 seconds
            setTimeout(() => { 
                progressWrapper.style.display = 'none'; 
                progressBar.style.width = '0%'; 
            }, 3000);
        }
    };

    xhr.open('POST', UPLOAD_URL, true);
    xhr.send(formData);
}

// Initial + auto refresh
refresh();
setInterval(refresh, 5000);
</script>

</body>
</html>

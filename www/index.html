<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Platform Control Center</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">

    <style>
        body {
            max-width: 1100px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .status {
            font-weight: bold;
        }

        .running { color: green; }
        .exited { color: red; }
        .paused { color: orange; }

        button {
            margin-top: 6px;
        }

        code {
            font-size: 12px;
        }
    </style>
</head>

<body>

<h1>🚀 Data Platform Control Center</h1>

<div class="grid">

    <!-- LEFT: SERVICE STATUS -->
    <section>
        <h3>Live Services</h3>
        <div id="services">Loading...</div>
    </section>

    <!-- RIGHT: LINKS -->
    <section>
        <h3>Quick Links</h3>
        <ul>
            <li><a href="http://localhost:8080" target="_blank">Airflow</a></li>
            <li><a href="http://localhost:8088" target="_blank">Superset</a></li>
            <li><a href="https://localhost:8443/nifi" target="_blank">NiFi</a></li>
            <li><a href="http://localhost:5050" target="_blank">pgAdmin</a></li>
            <li><a href="http://localhost:8082" target="_blank">dbt Docs</a></li>
        </ul>

        <h3>System</h3>
        <button onclick="refresh()">🔄 Refresh Now</button>
    </section>

</div>

<script>
const API = "http://localhost:9000/status";

async function restart(name) {
    await fetch(`http://localhost:9000/service/${name}/restart`, {
        method: "POST"
    });
    setTimeout(refresh, 1500);
}

function render(data) {
    const container = document.getElementById("services");
    container.innerHTML = "";

    Object.entries(data).forEach(([name, info]) => {

        const div = document.createElement("div");
        div.className = "card";

        const statusClass =
            info.status === "running" ? "running"
            : info.status === "exited" ? "exited"
            : "paused";

        div.innerHTML = `
            <div><strong>${name}</strong></div>

            <div class="status ${statusClass}">
                ${info.status}
            </div>

            <div>
                🧠 health: <code>${info.health}</code>
            </div>

            <div>
                ⏱ uptime: <code>${info.uptime}</code>
            </div>

            <div>
                📦 image: <code>${info.image}</code>
            </div>

            <button onclick="restart('${name}')">
                🔁 Restart
            </button>
        `;

        container.appendChild(div);
    });
}

async function refresh() {
    try {
        const res = await fetch(API);
        const data = await res.json();
        render(data);
    } catch (err) {
        document.getElementById("services").innerHTML =
            "<p style='color:red'>Failed to load status API</p>";
    }
}

// initial + auto refresh
refresh();
setInterval(refresh, 5000);

</script>

</body>
</html>
